name: Daily AI Newsroom

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create article
        run: |
          echo "<html><body><h1>Daily Edition</h1><p>Test article working.</p></body></html>" > ai-edition.html

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Daily AI Edition"
          body: "Test run"
          commit-message: "Test article"
          branch: daily-edition
          base: main
          add-paths: |
            ai-edition.html
