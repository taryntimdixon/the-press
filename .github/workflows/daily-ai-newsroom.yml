name: Daily AI Newsroom

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenAI
        run: pip install openai

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - << 'EOF'
          from openai import OpenAI
          import os

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])

          response = client.responses.create(
              model="gpt-5.4-mini",
              input="Write a 1500 word high-quality news article about a major current topic."
          )

          content = response.output_text

          with open("ai-edition.html", "w") as f:
              f.write(f"<html><body><h1>Daily Edition</h1><p>{content}</p></body></html>")
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Daily AI Edition"
          body: "Review today's AI-generated articles before publishing."
          commit-message: "New AI edition"
          branch: daily-edition
          base: main
          add-paths: |
            ai-edition.html
