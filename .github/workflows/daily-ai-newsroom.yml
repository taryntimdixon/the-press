name: Daily AI Newsroom

on:
  workflow_dispatch:
    inputs:
      story_count:
        description: "How many new long-form stories to generate. Default: 15."
        required: true
        default: "15"
      image_cap:
        description: "Max NEW AI images this run. 45 = 15 articles x (1 thumbnail + 2 article photos)."
        required: true
        default: "45"
      article_cap:
        description: "Max NEW articles to receive AI art. Default: 15."
        required: true
        default: "15"
      gallery_images_per_article:
        description: "Article photos/visuals per article. Default: 2."
        required: true
        default: "2"
  schedule:
    - cron: "5 12 * * *"

jobs:
  preserve-and-append:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests beautifulsoup4

      - name: Verify automation scripts exist
        run: |
          ls -la studio/automation
          test -f studio/automation/preserve_old_and_new_issue_v34567.py
          test -f studio/automation/ai_thumbnail_backfill.py

      - name: Generate new issue without wiping old site
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          STORY_COUNT: ${{ github.event.inputs.story_count || '15' }}
          SITE_BASE_URL: https://thepress.live
          OPENAI_MODEL: gpt-5.4-mini
          ARTICLE_TARGET_WORDS: "2500"
          MIN_SOURCES: "30"
          MAX_SOURCES: "100"
          MIN_UNIQUE_SOURCE_DOMAINS: "10"
          QUALITY_REPAIR_ATTEMPTS: "4"
          FACT_CHECK_PASSES: "1"
          MAX_OUTPUT_TOKENS: "24000"
          MAX_STORY_COUNT: "30"
          STRICT_QUALITY_GATE: "1"
        run: |
          python studio/automation/preserve_old_and_new_issue_v34567.py

      - name: Build AI thumbnails and 2 article photos for new stories only
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_THUMBNAIL_BACKFILL: "1"
          OPENAI_IMAGE_MODEL: gpt-image-2
          OPENAI_IMAGE_SIZE: 1536x864
          OPENAI_IMAGE_QUALITY: high
          OPENAI_IMAGE_FORMAT: jpeg
          OPENAI_IMAGE_COMPRESSION: "85"
          AI_ART_SCOPE: current_issue
          AI_ART_MAX_ARTICLES: ${{ github.event.inputs.article_cap || '15' }}
          AI_TOTAL_IMAGE_MAX_GENERATIONS: ${{ github.event.inputs.image_cap || '45' }}
          AI_THUMBNAIL_MAX_GENERATIONS: "0"
          REPLACE_SVG_ARTICLE_THUMBNAILS: "1"
          FORCE_AI_FOR_ALL_ARTICLE_THUMBNAILS: "1"
          FORCE_AI_FOR_DAILY_STORIES: "1"
          AI_ART_PACKAGE_BACKFILL: "1"
          AI_GALLERY_MIN_IMAGES: "2"
          AI_GALLERY_MAX_IMAGES: "2"
          AI_GALLERY_IMAGES_PER_ARTICLE: ${{ github.event.inputs.gallery_images_per_article || '2' }}
          AI_UPDATE_LINKED_CARDS: "1"
          AI_CARD_UPDATE_SCOPE: front_pages
          AI_ART_PROMPT_MODEL: gpt-5.4-mini
        run: |
          python studio/automation/ai_thumbnail_backfill.py

      - name: Create review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-preserve-${{ github.run_number }}
          delete-branch: true
          title: "The Press daily issue — 15 new stories with AI art"
          body: |
            This PR preserves the existing site and appends the newest daily issue.

            Image behavior in this version:
            - targets only the newest articles listed in daily-latest.json
            - generates 1 AI thumbnail per new article
            - generates 2 AI article photos/visuals per new article
            - caps the run at 45 new images by default
            - does not backfill the entire historical website

            Do not merge if the PR only changes one file.
          commit-message: "Append daily issue with AI thumbnails and 2 article photos"
