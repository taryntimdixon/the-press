name: Daily AI Newsroom

on:
  workflow_dispatch:
    inputs:
      story_count:
        description: "How many new long-form stories to generate. Default: 15."
        required: true
        default: "15"
      image_cap:
        description: "Max NEW AI thumbnails this run. 15 = one thumbnail for every selected article."
        required: true
        default: "0"
      article_cap:
        description: "Max newest articles to receive AI thumbnails. Default: 15."
        required: true
        default: "0"
  schedule:
    - cron: "5 12 * * *"

jobs:
  preserve-and-append:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests beautifulsoup4

      - name: Verify automation scripts exist
        run: |
          ls -la studio/automation
          test -f studio/automation/preserve_old_and_new_issue_v34567.py
          test -f studio/automation/ai_thumbnail_backfill.py

      - name: Generate new issue without wiping old site
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          STORY_COUNT: ${{ github.event.inputs.story_count || '15' }}
          SITE_BASE_URL: https://thepress.live
          OPENAI_MODEL: gpt-5.5
          # Keep the long-form standard, but make sourcing sane.
          # The hard gate requires 2,500+ words and 20+ distinct HTTPS sources.
          ARTICLE_TARGET_WORDS: "2500"
          MIN_SOURCES: "20"
          MAX_SOURCES: "30"
          MIN_UNIQUE_SOURCE_DOMAINS: "8"

          QUALITY_REPAIR_ATTEMPTS: "2"
          FACT_CHECK_PASSES: "1"
          MAX_OUTPUT_TOKENS: "24000"
          MAX_STORY_COUNT: "30"
          STRICT_QUALITY_GATE: "0"
          STRICT_EDITORIAL_GATES: "0"

          RECENT_TOPIC_LOOKBACK: "120"
          RECENT_TOPIC_SIMILARITY_LIMIT: "0.34"
          ISSUE_TOPIC_SIMILARITY_LIMIT: "0.26"
          VISUAL_CONCEPT_SIMILARITY_LIMIT: "0.32"
          TITLE_RHYTHM_SIMILARITY_LIMIT: "0.64"
          TITLE_STYLE_GATE: "1"

          # Topic Radar: assignment planning before article generation.
          TOPIC_SELECTION_MODE: "radar"
          TOPIC_RADAR_MODEL: gpt-5.5
          TOPIC_RADAR_CANDIDATE_MULTIPLIER: "3"
          TREND_LOOKBACK_HOURS: "48"
          HEADLINE_CERTAINTY_GATE: "1"
          MAX_AVG_SENTENCE_WORDS: "24"
          MAX_LONG_SENTENCE_SHARE: "0.22"
          MIN_WORLD_HEAT_STORIES: "3"
          MIN_AI_OR_SCIENCE_STORIES: "2"
          MIN_FOOD_CULTURE_LIFE_STORIES: "1"
          MIN_WEIRD_OR_NICHE_STORIES: "1"
          MIN_NON_US_STORIES: "4"
          MAX_US_INSTITUTIONAL_PROCESS_STORIES: "2"
          MAX_SAME_COUNTRY_STORIES: "2"
          MAX_SAME_BUCKET_STORIES: "3"
          WILDCARD_RATE: "0.20"
        run: |
          python studio/automation/preserve_old_and_new_issue_v34567.py

      - name: Build GPT Image 2 thumbnails for new stories only
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_THUMBNAIL_BACKFILL: "1"

          OPENAI_IMAGE_MODEL: gpt-image-2
          OPENAI_IMAGE_SIZE: 1536x864
          OPENAI_IMAGE_QUALITY: high
          OPENAI_IMAGE_FORMAT: jpeg
          OPENAI_IMAGE_COMPRESSION: "85"

          AI_ART_SCOPE: current_issue
          AI_ART_MAX_ARTICLES: ${{ github.event.inputs.article_cap || '0' }}
          AI_TOTAL_IMAGE_MAX_GENERATIONS: ${{ github.event.inputs.image_cap || '0' }}
          AI_THUMBNAIL_MAX_GENERATIONS: ${{ github.event.inputs.image_cap || '0' }}

          REPLACE_SVG_ARTICLE_THUMBNAILS: "1"
          FORCE_AI_FOR_ALL_ARTICLE_THUMBNAILS: "1"
          FORCE_AI_FOR_DAILY_STORIES: "1"

          AI_ART_PACKAGE_BACKFILL: "0"
          AI_GALLERY_IMAGES_PER_ARTICLE: "0"

          AI_UPDATE_LINKED_CARDS: "1"
          AI_CARD_UPDATE_SCOPE: front_pages
          AI_ART_PROMPT_MODEL: gpt-5.5
          # Reuse existing GPT Image thumbnails on reruns; new articles still generate thumbnails.
          AI_REGENERATE_AI_THUMBNAILS: "0"
        run: |
          python studio/automation/ai_thumbnail_backfill.py

      - name: Create review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-preserve-${{ github.run_number }}
          delete-branch: true
          title: "The Press daily issue — 15 sourced stories with GPT Image 2 thumbnails"
          body: |
            This PR preserves the existing site and appends the newest daily issue.

            Current rules:
            - 15 new long-form stories by default
            - each article is repaired toward the 2,500+ word quality standard
            - each article must include 20+ distinct live HTTPS source URLs
            - generates one high-quality GPT Image 2 thumbnail per new article
            - reuses existing GPT Image thumbnails on reruns
            - topic radar creates a reviewable assignment plan before article writing
            - reader voice and headline humility checks are included
            - repairs and warns on near-duplicate topics, formulaic headlines, and repeated thumbnail clichés
            - does not generate article galleries/photos
            - targets only the newest articles listed in daily-latest.json
            - does not backfill or rewrite the historical website

            Review the generated thumbnails before merging.
          commit-message: "Append daily issue with GPT Image 2 thumbnails"
