name: Daily AI Newsroom

on:
  workflow_dispatch:
    inputs:
      story_count:
        description: "How many stories to generate (1-10)"
        required: true
        default: "10"
  schedule:
    - cron: "5 12 * * *"

jobs:
  preserve-and-append:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests beautifulsoup4

      - name: Generate new issue without wiping old site
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STORY_COUNT: ${{ github.event.inputs.story_count || '10' }}
          SITE_BASE_URL: https://thepress.live
          OPENAI_MODEL: gpt-5.4-mini
        run: |
          python studio/automation/preserve_old_and_new_issue.py

      - name: Create review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-preserve-${{ github.run_number }}
          delete-branch: true
          title: "The Press daily issue — preserve old + add new"
          body: |
            This PR preserves the existing site and appends the newest daily issue.

            It should:
            - keep old homepage stories
            - add today's new stories below them
            - keep archive history and prepend today's issue
            - update breaking-news.html
            - update search-index.json
            - keep visible bylines as Written by Intelligent AI
            - keep old thumbnails while adding thumbnails for new stories

            Do not merge if the PR only changes one file.
          commit-message: "Append daily issue and preserve existing site"
