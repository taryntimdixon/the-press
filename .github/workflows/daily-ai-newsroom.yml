name: Daily AI Newsroom

on:
  workflow_dispatch:
    inputs:
      story_count:
        description: "How many stories to generate (1-10)"
        required: true
        default: "10"
  schedule:
    - cron: "5 12 * * *"

jobs:
  build-daily-issue:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenAI SDK
        run: python -m pip install --upgrade pip openai

      - name: Stage generator in the correct path
        run: |
          mkdir -p studio/automation
          cp daily_worldwide_issue.py studio/automation/daily_worldwide_issue.py

      - name: Generate full 10-story issue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_BASE_URL: https://thepress.live
          OPENAI_MODEL: gpt-5.4-mini
          STORY_COUNT: ${{ github.event.inputs.story_count || '10' }}
        run: |
          python studio/automation/daily_worldwide_issue.py

      - name: Create review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: daily-edition
          title: "Daily AI Edition"
          body: |
            Daily 10-story issue generated for review.

            This PR should update:
            - index.html
            - ai-edition.html
            - archive.html
            - breaking-news.html
            - search-index.json
            - daily/... article pages

            Only merge when the files changed list shows the full issue, not a single file.
          commit-message: "Build daily AI edition"
          add-paths: |
            index.html
            ai-edition.html
            archive.html
            breaking-news.html
            search-index.json
            daily/**
