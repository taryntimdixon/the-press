name: Backfill AI Article Art Packages

on:
  workflow_dispatch:

jobs:
  ai-thumbnail-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai beautifulsoup4

      - name: Run AI article-art backfill
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_THUMBNAIL_BACKFILL: "1"
          OPENAI_IMAGE_MODEL: gpt-image-2
          OPENAI_IMAGE_SIZE: 2048x1152
          OPENAI_IMAGE_QUALITY: high
          AI_TOTAL_IMAGE_MAX_GENERATIONS: "0"
          AI_THUMBNAIL_MAX_GENERATIONS: "0"
          REPLACE_SVG_ARTICLE_THUMBNAILS: "1"
          FORCE_AI_FOR_ALL_ARTICLE_THUMBNAILS: "1"
          FORCE_AI_FOR_DAILY_STORIES: "1"
          AI_ART_PACKAGE_BACKFILL: "1"
          AI_GALLERY_MIN_IMAGES: "6"
          AI_GALLERY_MAX_IMAGES: "10"
          AI_GALLERY_IMAGES_PER_ARTICLE: "8"
          AI_ART_PROMPT_MODEL: gpt-5.4-mini
        run: |
          python studio/automation/ai_thumbnail_backfill.py

      - name: Create review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-thumbnail-backfill-${{ github.run_number }}
          delete-branch: true
          title: "Backfill article thumbnails and galleries with AI art"
          body: |
            This PR replaces article thumbnails with article-specific AI images and adds 6-10 AI-generated visuals to each article, including scenes, explainers, and map-style illustrations.

            Please review the generated images, then merge when ready.
          commit-message: "Backfill AI article art packages"
