<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>On This Day Preview — The Press</title>
  <meta name="description" content="Explore all 365 On This Day history entries from The Press." />
  <link rel="stylesheet" href="styles.css?v=1781265774" />
</head>
<body class="page-archive page-on-this-day-preview">
<a class="history-preview-back" href="index.html" data-history-preview-back aria-label="Back to previous page">Back</a>
<main class="page history-preview-page">
  <section class="history-preview-hero">
    <p class="eyebrow">On this day preview</p>
    <h1>365 Trips Back To The Past</h1>
    <p class="section-copy">Explore the full daily history calendar: one event for every date, with the fact, the stakes, and the context behind why it still matters.</p>
    <div class="history-preview-tools" aria-label="History preview filters">
      <label>
        <span>Search</span>
        <input type="search" data-history-preview-search placeholder="Search date, event, fact, or topic" />
      </label>
      <label>
        <span>Lane</span>
        <select data-history-preview-lane>
          <option value="all">All lanes</option>
        </select>
      </label>
      <label>
        <span>Era</span>
        <select data-history-preview-era>
          <option value="all">All eras</option>
        </select>
      </label>
    </div>
    <p class="history-preview-count" data-history-preview-count>Showing all 365 entries</p>
  </section>
  <div class="history-preview-browser">
    <section class="history-preview-grid" data-history-preview-grid aria-live="polite"></section>
    <aside class="history-preview-jump" aria-label="Jump through the history calendar">
      <div class="history-preview-jump__head">
        <span>Jump</span>
        <button type="button" data-history-preview-today>Today</button>
      </div>
      <div class="history-preview-calendar" data-history-preview-calendar>
        <div class="history-preview-calendar__nav">
          <button type="button" data-history-preview-month-prev aria-label="Previous month">‹</button>
          <strong data-history-preview-month-label>January</strong>
          <button type="button" data-history-preview-month-next aria-label="Next month">›</button>
        </div>
        <div class="history-preview-calendar__weekdays" aria-hidden="true">
          <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
        </div>
        <div class="history-preview-calendar__days" data-history-preview-calendar-days></div>
      </div>
    </aside>
  </div>
  <button class="history-preview-top" type="button" data-history-preview-top aria-label="Back to top">Back to top</button>
</main>
<footer class="footer">
  <div class="footer-grid footer-grid--archive-only">
    <div>
      <a class="footer-brand" href="index.html">The Press</a>
      <p>A daily history calendar from The Press.</p>
    </div>
  </div>
</footer>
<script src="assets/on-this-day-moments.js?v=1780763044" defer></script>
<script src="assets/on-this-day-artwork.js?v=1780757231" defer></script>
<script src="app.js?v=1780764658" defer></script>
<script src="assets/on-this-day-preview.js?v=1780764658" defer></script>
</body>
</html>
